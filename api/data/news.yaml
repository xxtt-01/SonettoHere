    title: "记忆管理工具上线"
    description: "记忆 CRUD 操作变为主 Agent 可直接调用的独立 Skill，并配专属前端气泡组件。主 Agent 现在能自主读取、创建、更新和删除长期记忆，支持按主题分区管理。"
    type: "feat"
