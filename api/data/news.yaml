news:
  - id: "llm-html-sandbox"
    en_title: "LLM HTML Sandbox"
    title: "LLM HTML 沙箱渲染支持"
    description: "LLM 现在可以直接输出交互式 HTML/CSS/JS，自动在隔离沙箱中渲染。支持点击、动画、计数器等前端交互效果。对 Agent 而言，将 HTML 效果直接写在代码块外即可触发渲染。"
    type: "feat"
    date: "2026-06-13"
    tags: ["前端", "沙箱", "交互"]
    version: "PREVIEW"
    pr_number: 99
  - id: "ruri-ref-system"
    en_title: "Project Ruri"
    title: "琉璃计划：引用系统重构"
    description: "琉璃计划旨在为用户提供更多彩的引用体验。引用系统全面重构为可辨识联合（Discriminated Union）架构，统一管理文件、文件夹、文本、网页链接、Anthropic Skill 和内置工具六种引用类型。新增 @ 触发技能补全、# 触发工具补全、粘贴 URL 自动识别为链接引用。引入 REF_CHIP_CONFIG 注册机制，新类型即插即用无需修改渲染组件。"
    type: "feat"
    date: "2026-06-13"
    tags: ["Ruri", "引用", "重构", "UI"]
    version: "PREVIEW"
    pr_number: 98
  - id: "convallaria-prompt-caching"
    en_title: "Project Convallaria"
    title: "铃兰计划首期完成"
    description: "铃兰计划（Project Convallaria）首期聚焦 Prompt Caching 前缀稳定优化。系统提示词在进程生命周期内字节级一致，大幅提升模型缓存命中率。同时完成前端消息元数据结构化改造、记忆读取工具拆分（list_memories/read_memories），以及移除固定位置的时间变量"
    type: "feat"
    date: "2026-06-10"
    tags: ["模型费用", "性能", "缓存"]
    version: "v1.5.0"
    pr_number: 95

  - id: "cancel-tool-checkpoint"
    en_title: "Cancel Tool Message Checkpoint"
    title: "工具调用时允许截停"
    description: "Project Time Traveler 第二个功能「Cancel-Tool」上线。覆盖绝大部分工具，允许工具运行时手动截停。LLM将从工具返回结果中知晓用户截停操作。"
    type: "feat"
    date: "2026-06-09"
    tags: ["Skill", "取消", "稳定"]
    version: "v1.5.0"
    pr_number: 94

  - id: "code-guardian"
    en_title: "Code Guardian"
    title: "代码执行前审查功能正式发布"
    description: "我们引入了对于Python执行工具的审批系统。审核模式下展示待执行代码的完整预览，支持允许或拒绝操作，拒绝时可附带详细反馈。双模式（自动/审核）架构兼顾开发效率与安全管控。"
    type: "feat"
    date: "2026-06-04"
    tags: ["Python", "代码执行", "安全"]
    version: "v1.5.0"
    pr_number: 93

  - id: "time-traveler-undo"
    en_title: "Project Time Traveler"
    title: "对话撤回功能上线"
    description: "Project Time Traveler 首个功能「Single-Undo」上线。在聊天界面右键自己的消息即可撤回最近一轮对话，包含用户消息、AI 回复和所有工具调用，状态干净回退，不再需要手动删除或重新提问。"
    type: "feat"
    date: "2026-06-01"
    tags: ["TimeTraveler", "撤回", "对话"]
    version: "v1.4.0"
    pr_number: 89

  - id: "vignette-waterfall"
    en_title: "Project Vignette"
    title: "Vignette 记忆分区上线"
    description: "新增 Vignette 记忆分区视图，按分区直观展示记忆卡片。SectionCard 卡片组件全面重构，单条轮播模式使信息密度更低，视觉更加精炼统一。"
    type: "feat"
    date: "2026-06-01"
    tags: ["记忆", "Vignette", "UI"]
    version: "v1.4.0"
    pr_number: 87

  - id: "v1.3.0-release"
    en_title: "v1.3.0 Release"
    title: "发布 v1.3.0 版本"
    description: "v1.3.0 聚焦简化与打磨。移除 CLI 和 QQ Bot 入口，专注 Web UI 体验；新增文件精确编辑和记忆管理独立 Skill；侧栏点击会话可直接切换聊天；用户交互不再受超时限制；首页上线更新动态新闻页，版本发布信息一目了然。"
    type: "feat"
    date: "2026-05-31"
    tags: ["发布", "版本"]
    version: "v1.3.0"
    pr_number: 85

  - id: "remove-cli-qqbot"
    en_title: "CLI & QQ Bot Removal"
    title: "移除 CLI 和 QQ Bot 支持"
    description: "移除了 cli.py 和 qqbot.py 两个客户端入口，项目现在仅通过 Web UI 提供对话界面。同时清理了 colorama 和 qq-botpy 依赖，简化项目结构和启动方式（直接 python main.py 即可）。"
    type: "refactor"
    date: "2026-05-31"
    tags: ["重构", "清理", "简化"]
    version: "v1.3.0"
    pr_number: 85

  - id: "file-edit-tool"
    en_title: "Precise File Editing"
    title: "文件精确编辑工具上线"
    description: "新增文件精确编辑 Skill（file_edit），支持精确字符串替换、多笔顺序编辑、按行号读取和正则搜索。配有专属前端气泡组件，展示替换结果、代码行号视图和匹配列表。"
    type: "feat"
    date: "2026-05-30"
