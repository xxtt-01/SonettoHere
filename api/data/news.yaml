    description: "前端 UI 迎来简洁的黑白风格重新设计。包括全新的侧边栏、卡片布局和导航系统。新增可折叠侧边栏（折叠后宽度 58px）、Health Panel 系统状态面板以及打字机（Typewriter）效果的欢迎动画。"
