cards:
- id: 0
  name: 愚人
  name_en: The Fool
  symbol: '0'
  suit: 大阿尔卡纳
  element: 风
  keywords:
  - 全新开始
  - 自由
  - 天真
  - 冒险
  - 无限可能
  - 自发性
  upright:
  - 一个全新的旅程正在召唤你，带着纯粹的好奇心和热情迈出第一步。
  - 你站在悬崖边缘，虽然不知道前方有什么，但内心充满了无限的可能性。
  - 现在正是放下顾虑、信任宇宙指引的时候，勇敢地追随你的内心。
  - 以开放的心态拥抱未知，这份纯真和乐观会带你走向意想不到的收获。
  - 新的机遇和潜力正在向你敞开，此刻所需要的只是一次信任的飞跃。
  reversed:
  - 你心中已经有了新的想法，但还没有准备好将它带入现实世界。
  - 也许是时机未到，也许是缺乏信心，某种力量正在阻止你向前迈出那一步。
  - 担心自己不具备所需的技能和资源，这种不安让你迟迟不愿开始。
  - 你可能因为害怕未知而选择留在舒适区，但这样也错过了成长的机会。
  - 鲁莽和冲动不能代替真正的勇气，在行动之前先仔细观察脚下的路。
- id: 1
  name: 魔术师
  name_en: The Magician
  symbol: I
  suit: 大阿尔卡纳
  element: 风
  keywords:
  - 意志力
  - 创造力
  - 资源整合
  - 技能
  - 显化
  - 沟通
  upright:
  - 你的手中握有将梦想变为现实所需的一切工具和能力，此刻正是行动的良机。
  - 拥有清晰的意图和坚定的意志力，你能够将想法转化为看得见摸得着的成果。
  - 所有元素都在你的掌控之中，善用你的技能和智慧去创造你想要的未来。
  - 沟通能力达到顶峰，你的语言和行动都充满了令人信服的力量和魅力。
  - 宇宙的能量正通过你流向物质世界，这是运用你的天赋去实现目标的时刻。
  reversed:
  - 你拥有实现目标所需的潜能，但这些才能尚未被有效地聚焦和发挥出来。
  - 可能有人在利用技巧和魅力进行欺骗，需要警惕那些看似好意却另有所图的人。
  - 你的目标缺乏清晰的焦点，分散的精力让努力难以见到真正的成效。
  - 与内心最高愿景失去了连接，需要重新审视你的动机是否纯粹而真实。
  - 迟迟不愿迈出第一步，在等待所谓完美时机的同时机会正在悄悄流逝。
- id: 2
  name: 女祭司
  name_en: The High Priestess
  symbol: II
  suit: 大阿尔卡纳
  element: 水
  keywords:
  - 直觉
  - 神秘
  - 潜意识
  - 内在智慧
  - 灵性知识
  - 沉静
  upright:
  - 答案不在外界而在你的内心深处，安静下来倾听内在的声音和直觉的指引。
  - 你正站在意识与潜意识的交界处，更深的真理正在向你悄悄揭示。
  - 现在不是用逻辑分析的时候，而是信任你的直觉去感知事物的本质。
  - 世界的表象之下隐藏着更深层的意义，保持沉默和观察才能领悟其中的奥秘。
  - 神圣的智慧正在你内心苏醒，通过冥想和自省你能触及更高的觉知。
  reversed:
  - 你可能忽略了自己的直觉和内在声音，被外界的喧嚣和他人的意见所淹没。
  - 某些秘密或隐藏的信息还没有被揭示，需要保持耐心等待真相浮出水面。
  - 内心的恐惧和压抑的情感正在阻碍你聆听自己真正的感受和需求。
  - 过度依赖理性思考而忽视了直觉的智慧，导致判断失去了内在的平衡。
  - 需要从外界的纷扰中抽身而出，给自己安静独处的时间来重新连接内心。
- id: 3
  name: 女皇
  name_en: The Empress
  symbol: III
  suit: 大阿尔卡纳
  element: 地
  keywords:
  - 丰盛
  - 母性
  - 创造力
  - 自然
  - 生育
  - 感官享受
  upright:
  - 你正处于丰盛和繁荣的时期，所有播下的种子都在茁壮成长，收获的季节即将到来。
  - 大地母亲般的滋养能量环绕着你，你要做的就是敞开心扉接受这份温暖和呵护。
  - 创造力如泉水般涌流，将你的艺术天赋和想象力尽情地表达和释放出来。
  - 与自然和身体的连接变得前所未有的紧密，享受感官带来的愉悦和满足感。
  - 这是孕育新生命、新创意或新项目的绝佳时机，让一切自然而然地生长。
  reversed:
  - 在过分照顾他人需求的过程中，你可能忽略了自己的感受和自我关爱。
  - 创造力遇到了瓶颈，需要重新连接内心的灵感和自然的力量来突破僵局。
  - 对他人的过度依赖正在削弱你的独立性和内在的力量源泉。
  - 也许是时候将关爱和呵护的能量转向自己，先填满自己的杯子再去照顾别人。
  - 情感上的匮乏感可能源于与自然和自我身体之间的连接出现了断裂。
- id: 4
  name: 皇帝
  name_en: The Emperor
  symbol: IV
  suit: 大阿尔卡纳
  element: 火
  keywords:
  - 权威
  - 结构
  - 稳定
  - 纪律
  - 领导力
  - 保护
  upright:
  - 通过建立清晰的规则和结构，你能够将混乱转化为有序，稳步地实现目标。
  - 你的领导力和决断力在这个阶段得到彰显，以坚定的意志引领他人前行。
  - 自律和坚持是你最强大的武器，将计划分解为可执行的步骤并严格执行到底。
  - 父亲般的保护力量出现在你的生活中，为你提供稳定和安全的坚实基础。
  - 凭借丰富的经验和智慧，你已经成为值得信赖的导师和决策者。
  reversed:
  - 权威可能被滥用或变得过于僵化，过度的控制正在压制创造力和个人的自由。
  - 可能面临一个专横的上司或父亲形象，他们的控制让你感到窒息和无力反抗。
  - 你自身在纪律和责任感方面有所欠缺，需要重新建立健康的自律习惯。
  - 在应该果断决策的时候犹豫不决，逃避作为领导者应承担的责任和义务。
  - 对权力的执着可能源于内心的不安全感，需要审视你究竟在掌控什么、害怕什么。
- id: 5
  name: 教皇
  name_en: The Hierophant
  symbol: V
  suit: 大阿尔卡纳
  element: 土
  keywords:
  - 传统
  - 精神指引
  - 教育
  - 信仰
  - 从众
  - 导师
  upright:
  - 寻求一位值得信赖的导师或精神向导，他们的经验和智慧将为你指明前进的方向。
  - 遵循已被时间验证的传统和规范，有时候最古老的道路反而是最可靠的。
  - 加入一个志同道合的群体或组织，在共同的信仰和价值观中找到归属感。
  - 适合接受正规教育和系统化学习，通过深入研究某个领域来获得真正的知识。
  - 你的信仰体系正在指引你做出选择，尊重传统智慧和仪式所带来的内在力量。
  reversed:
  - 是时候打破旧有的规则和传统的束缚，探索属于你自己的独特精神道路和信仰。
  - 你可能在盲目服从权威或教条，需要重新审视这些信念是否真正属于你自己。
  - 对僵化的制度和教条感到不满，内心渴望突破约束去寻求更自由的表达方式。
  - 请记住，你本身就是自己最好的老师，所有的智慧最终都来自你的内心深处。
  - 可能正在经历信仰危机或与传统的决裂，这对个人成长来说既是挑战也是解脱。
- id: 6
  name: 恋人
  name_en: The Lovers
  symbol: VI
  suit: 大阿尔卡纳
  element: 风
  keywords:
  - 爱情
  - 和谐
  - 选择
  - 价值观一致
  - 连接
  - 承诺
  upright:
  - 一段深刻而真实的连接正在你的生命中展开，它建立在相互尊重和深刻理解之上。
  - 你面临一个重要的选择，请在做出决定之前认真审视自己内心真正珍视的核心价值观。
  - 在关系中保持坦诚和脆弱，真正的亲密来自于双方都愿意暴露最真实的自己。
  - 这段关系超越了表面的吸引，达到了灵魂层面的共鸣和深度的承诺。
  - 无论面对的是人还是事，请跟随你的内心做出与核心价值观完全一致的抉择。
  reversed:
  - 关系中出现不和谐的音符，双方可能不再分享相同的价值观和共同的目标。
  - 你内心正在经历激烈的冲突，理智和情感各自指向不同的方向，让你难以抉择。
  - 对承诺的恐惧或犹豫不决让你无法将关系推进到更深入和稳定的阶段。
  - 沟通出现了严重问题，双方不再坦诚相待，导致误解和隔阂逐渐加深。
  - 需要诚实地面对自己：你究竟是在用心维护一段关系，还是在害怕放手后的孤独。
- id: 7
  name: 战车
  name_en: The Chariot
  symbol: VII
  suit: 大阿尔卡纳
  element: 水
  keywords:
  - 意志力
  - 胜利
  - 自律
  - 决心
  - 控制
  - 专注
  upright:
  - 通过强大的意志力和严格的自律，你能够驾驭对立的力量，朝着目标全速前进。
  - 胜利已经在望，但你需要保持专注和坚定，不容许任何干扰让你偏离轨道。
  - 你已经掌握了自我控制的能力，能够将冲动和欲望驯服为前进的真正动力。
  - 这是一场需要永不放弃的战役，坚信自己的能力，克服一切迎面而来的阻碍。
  - 你不仅清楚地知道自己要去哪里，更有不屈不挠的决心去排除万难到达那里。
  reversed:
  - 你正在失去对局面的掌控，对立的力量开始失控，前进的方向变得模糊不清。
  - 也许你需要暂时停下来，改变方向而非继续一头撞向死胡同。
  - 动力和热情正在消退，当初的雄心壮志被现实中的挫折逐渐消磨殆尽。
  - 缺乏自律和专注力，精力被过多分散，难以在任何一条道路上取得突破。
  - 内心的冲突和矛盾让你无法一致地向前迈进，需要先整合好内在的对立力量。
- id: 8
  name: 力量
  name_en: Strength
  symbol: VIII
  suit: 大阿尔卡纳
  element: 火
  keywords:
  - 勇气
  - 内在力量
  - 慈悲
  - 坚定
  - 感化
  upright:
  - 你拥有巨大的内在力量和坚韧不拔的毅力，能够以温和而非暴力的方式克服生活中的重重障碍。
  - 这张牌鼓励你用慈悲和耐心来驯服内心的原始冲动和动物本能，将狂躁的能量转化为建设性的力量。
  - 你并非通过强制或控制他人来展现力量，而是以沉静的影响力与说服力潜移默化地改变周围的环境。
  - 当你面对恐惧、挑战或自我怀疑时，力量牌提醒你要相信自己具备渡过难关所需的一切勇气和毅力。
  - 你对他人充满同情心和包容力，愿意在别人需要的时候坚定地站在他们身边，成为值得信赖的支持者。
  reversed:
  - 你可能正在经历自信心的低谷，对自己的能力感到怀疑，甚至觉得自己无法应对眼前的挑战和考验。
  - 由于过度付出或长期承受压力，你的能量已经严重透支，需要通过休息和独处来恢复内在的力量和平衡。
  - 内心的恐惧和不安让你变得容易冲动和情绪失控，可能会以愤怒或攻击性的方式爆发出来伤害身边的人。
  - 你对自己的评价过于严苛，低估了自身实际拥有的韧性和复原力，需要回顾过去的成功来重新建立自信。
  - 力量牌逆位提醒你，在照顾他人之前首先要照顾好自己，学会设立清晰的边界而不是一味地牺牲自我。
- id: 9
  name: 隐士
  name_en: The Hermit
  symbol: IX
  suit: 大阿尔卡纳
  element: 水
  keywords:
  - 内省
  - 独处
  - 心灵探索
  - 内在指引
  - 智慧
  upright:
  - 隐士牌邀请你暂时远离日常生活的喧嚣，把注意力转向内心深处，通过独处和内省来寻找真实的答案。
  - 你正处于一段自我发现的精神旅程中，只有依靠自己内在的智慧之光，才能照亮前方接下来的每一步路。
  - 这是适合进行冥想、静修或心灵探索的时期，通过反思自己的动机和价值观，你将离真实的自我更近一步。
  - 你可能会遇到一位智慧的精神导师，但他的真正使命不是直接给你答案，而是教会你如何从自己内心找到答案。
  - 隐士牌提醒你，最深刻的真理和智慧不在外界的物质世界中，而存在于你灵魂深处那片宁静的空间里。
  reversed:
  - 你可能过分沉溺于独处和自省之中，开始将自己与外界隔绝开来，忽视了与他人保持联系的重要性。
  - 隐士牌逆位提醒你，如果一直在逃避日常事务而拒绝回归社会，那么你需要重新找回与外界互动的平衡。
  - 另一种可能是你根本没有给自己留出足够的内省时间，被日常琐事淹没以至于听不见内心真正的声音。
  - 在一段关系中，你可能感到被迫孤立或失去连接，双方对亲密和独处的需求出现了不可忽视的差异。
  - 你内心深处感到孤独和迷失方向，但你需要明白，主动寻求他人的陪伴和支持并不是软弱的表现。
- id: 10
  name: 命运之轮
  name_en: Wheel of Fortune
  symbol: X
  suit: 大阿尔卡纳
  element: 火
  keywords:
  - 命运
  - 转变
  - 循环
  - 运气
  - 机缘
  upright:
  - 命运之轮提醒你生命处于永恒的变化之中，无论此刻处于高潮还是低谷，一切都终将转变和流动。
  - 这是一个重大转折点即将到来的时刻，意想不到的机遇和好运正在向你靠近，你需要保持开放的心态去迎接。
  - 这张牌代表着因果循环和业力法则，你今天所付出的一切善意和努力，最终都会以某种方式回到你的身边。
  - 超出你控制范围的外部力量正在发挥作用，你无法强行改变命运的轨迹，最好的应对方式是顺其自然顺势而为。
  - 命运之轮鼓励你对宇宙的安排保持乐观和信念，相信冥冥之中有一种更高的力量在引导你走向正确的方向。
  reversed:
  - 你可能正在经历一段运气不佳的时期，一连串不受欢迎的变化和挫折让你感到措手不及甚至无能为力。
  - 命运之轮逆位往往反映出你对变化的强烈抗拒，你试图阻止事情按照它们自然的轨迹发展而导致更多的压力。
  - 然而这张牌也带来一个积极的可能性——你终于意识到某种负面循环已经持续太久，准备打破这个重复的困局。
  - 你需要诚实地审视自己在当前处境中所扮演的角色，思考过往的选择如何导致了今天的结果并从中吸取教训。
  - 即使身处低谷，命运之轮也从未停止转动，只要你愿意放手接纳变化，转机总会在最意想不到的时刻出现。
- id: 11
  name: 正义
  name_en: Justice
  symbol: XI
  suit: 大阿尔卡纳
  element: 风
  keywords:
  - 公正
  - 真相
  - 因果
  - 法律
  - 诚实
  upright:
  - 正义牌代表着公正、公平和真理的降临，你过去的所有行为都将被放在天平上衡量并得到相应的回报或后果。
  - 你可能面临一个重要的决定或法律事务，这张牌预示着公正的裁决即将到来，结果将是公平且不偏不倚的。
  - 这张牌要求你为自己的行为承担责任，勇敢面对自己做出的每一个选择所带来的必然结果和影响。
  - 正义牌鼓励你深入探索内心对真理和道德的认知，超越简单的二元对错，找到你能够问心无愧地坚持的立场。
  - 在做重要决策时，你需要同时运用理性的分析和直觉的指引，确保你的选择不仅合法合规更符合更高的道德准则。
  reversed:
  - 你内心可能很清楚自己做了不道德的事情，但还试图逃避责任或把错误归咎于他人，不愿诚实面对后果。
  - 正义牌逆位时，你内心那个严厉的批判者可能正在过度苛责自己，需要从自我宽恕和接纳开始重新出发。
  - 在面临关键抉择时，你的判断可能受到了偏见、私心或不完整信息的影响，导致无法做出公正的决定。
  - 如果你正卷入法律纠纷或正式的裁决程序，这张牌可能预示着不公正的结果或令人失望的判决。
  - 你拒绝正视自己行为带来的后果，但这种逃避只会让你背负更沉重的愧疚感，唯有承担责任才能获得真正的解脱。
- id: 12
  name: 倒吊人
  name_en: The Hanged Man
  symbol: XII
  suit: 大阿尔卡纳
  element: 水
  keywords:
  - 暂停
  - 臣服
  - 换位思考
  - 等待
  - 牺牲
  upright:
  - 倒吊人牌提醒你，有时候必须主动按下暂停键将一切事务搁置下来，才能获得全新的视角和突破性的认知。
